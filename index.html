<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÀI KIỂM TRA NGHIỆP VỤ THANH TOÁN FINTWIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .danger-stripes { background: repeating-linear-gradient(45deg, #fee2e2, #fee2e2 10px, #fef2f2 10px, #fef2f2 20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID"
        };
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.apps.length ? firebase.firestore() : null;

        // --- NGÂN HÀNG CÂU HỎI CHUYÊN MÔN CAO ---
        const allQuestions = [
            // 1. ĐỊNH DANH & LIÊN KẾT
            { q: "Mã định danh nguồn tiền (FUND_ID) của đối tác Fintwin trong hệ thống CRM ePass là gì?", options: ["6060", "1", "7", "2"], a: 2, exp: "FUND_ID = 7 là mã định danh duy nhất cho nguồn tiền Fintwin." },
            { q: "Trạng thái thanh toán trả sau (Active liên kết nguồn trả sau) trên hệ thống ePass được định danh bằng mã nào?", options: ["charge_method = 60", "charge_method = 61", "STATUS = 1", "PROCESSING_STATUS = 2"], a: 1, exp: "Mã 61 định danh cho Hợp đồng Active trả sau. Mã 60 là Inactive." },
            { q: "Để xác định Fintwin là nguồn tiền thanh toán CHÍNH đang được liên kết, hệ thống kiểm tra điều kiện gì trong bảng CRM.CONTRACT_PAYMENT?", options: ["STATUS = 3 và FUND_ID = 7", "STATUS = 1 và FUND_ID = 7", "STATUS = 2 và FUND_ID = 6060", "CHARGE_METHOD = 61"], a: 1, exp: "STATUS = 1 nghĩa là nguồn chính, STATUS = 3 là nguồn phụ." },
            { q: "Khi KH thực hiện liên kết nguồn tiền Fintwin, quy trình lấy thông tin ngân hàng diễn ra như thế nào?", options: ["Khách hàng nhập trực tiếp số thẻ/tài khoản trên App ePass", "FW cung cấp một URL Webview để KH chọn ngân hàng và xác thực", "Khách hàng gửi yêu cầu qua Email để CSKH cấu hình", "Hệ thống tự động liên kết qua số điện thoại đăng ký"], a: 1, exp: "App ePass gọi BE -> FW để lấy URL webview cho KH nhập thông tin an toàn trên môi trường của đối tác." },
            { q: "Đối với ngân hàng Vietinbank, luồng liên kết và huỷ liên kết Fintwin có điểm gì khác biệt so với các ngân hàng khác?", options: ["Chỉ hỗ trợ liên kết qua thẻ nội địa (Napas)", "Phải thực hiện xác thực qua tin nhắn SMS 2 lớp", "Webview điều hướng mở ứng dụng Ipay để KH thực hiện trực tiếp trên App Ngân hàng", "Thời gian chờ xác thực lên tới 24h"], a: 2, exp: "Với Vietinbank, luồng bắt buộc điều hướng sang ứng dụng Ipay của ngân hàng để thao tác." },
            { q: "Sau khi KH xác thực liên kết thành công trên Webview, Fintwin sẽ trả token về cho ePass thông qua API nào?", options: ["/transaction/fintwin/blacklist", "/provide-token", "/fintwin/link-success", "/payment/charge"], a: 1, exp: "API IPN trả token liên kết là /provide-token." },
            { q: "Trong trường hợp IPN liên kết hoặc huỷ liên kết thất bại (do lỗi mạng, timeout), Fintwin sẽ có cơ chế Retry như thế nào?", options: ["Không retry, huỷ luôn giao dịch và yêu cầu KH làm lại", "Retry tối đa 5 lần, mỗi lần cách nhau 1 phút", "Retry tối đa 3 lần, mỗi lần cách nhau 5 phút", "Ghi log lỗi và chờ vận hành xử lý thủ công"], a: 2, exp: "Cơ chế retry chuẩn của đối tác là tối đa 3 lần, mỗi lần cách nhau 5 phút." },
            { q: "Lưu ý quan trọng: Khách hàng yêu cầu HUỶ liên kết Fintwin nhưng hệ thống FE trả lỗi code 19. Nguyên nhân do đâu?", options: ["Hệ thống cổng thanh toán đang bảo trì", "Khách hàng có giao dịch chờ thanh toán (đã gửi FW nhưng FW chưa gọi lệnh sang Bank)", "Tài khoản giao thông đang bị khoá", "Chữ ký xác thực (Signature) không hợp lệ"], a: 1, exp: "Lỗi code 19 (Có GD chờ thanh toán): Không thể huỷ liên kết nếu lệnh đã đẩy sang FW mà chưa có kết quả cuối cùng từ Bank." },

            // 2. LUỒNG THANH TOÁN (DANTHE, ETC, PARK)
            { q: "Dịch vụ nào sau đây KHÔNG áp dụng trích nợ tự động qua Fintwin?", options: ["Phí dán/đổi thẻ", "Cước xe qua trạm", "Phí bãi đỗ xe", "Nạp tiền chủ động vào TKGT"], a: 3, exp: "Fintwin dùng để thanh toán cước phí dịch vụ phát sinh, không dùng cho dịch vụ nạp ví ePass." },
            { q: "Đối với dịch vụ Phí dán thẻ (DANTHE), nếu FW phản hồi thanh toán thất bại ngay lập tức (lỗi token, hệ thống), giao dịch nợ được lưu vào bảng nào?", options: ["SETTLEMENT.DEBT_TRANSACTION", "CRM.DEBIT_TRANSACTION", "SALE_TRANS_DETAIL", "SETTLEMENT.PARKING_DEBT_TRANSACTION"], a: 1, exp: "Nợ phí dán thẻ luôn được quản lý ở bảng CRM.DEBIT_TRANSACTION." },
            { q: "Tại sao giao dịch xe qua trạm (ETC) bằng nguồn tiền Fintwin lại được lưu ngay vào bảng SETTLEMENT.CDR_SUCCESS_TOLL_COLLECTION?", options: ["Vì OCS kiểm tra charge_method=61 (nguồn trả sau), TKGT không đủ tiền -> Commit cho xe qua trạm thành công, sinh CDR với charge_method_select=61.", "Vì FW yêu cầu gọi API đồng bộ sau mỗi 24h.", "Để đối soát với trạm BOT và tính phí hoa hồng.", "Hệ thống ghi nhận tạm thời do lỗi kết nối với Bank."], a: 0, exp: "Khi qua trạm, OCS kiểm tra charge_method=61, TKGT không đủ tiền -> commit cho xe qua, lưu CDR. Sau đó thủ tục quét kiểm tra tiếp FUND_ID=7 để đẩy sang DEBT_TRANSACTION." },
            { q: "Thủ tục quét dữ liệu định kỳ (Job Sync) đẩy giao dịch từ CDR_SUCCESS_TOLL_COLLECTION sang DEBT_TRANSACTION yêu cầu lọc dữ liệu theo điều kiện nào liên quan đến FUND_ID?", options: ["FUND_ID = 1 hoặc 2", "FUND_ID = 6060", "FUND_ID = 7 (Khác 6060 để tách nguồn VISA)", "Bỏ qua điều kiện FUND_ID"], a: 2, exp: "Cần lọc FUND_ID = 7 để đảm bảo chỉ lấy các GD của Fintwin, tách biệt với luồng xử lý thẻ Visa (6060)." },
            { q: "Thủ tục quét dữ liệu định kỳ đẩy giao dịch từ CDR sang DEBT_TRANSACTION chạy với tần suất bao lâu trên môi trường Production?", options: ["10 phút/lần", "1 tiếng/lần", "1 phút/lần", "Chỉ chạy 1 lần vào cuối ngày"], a: 2, exp: "Trên Production, Job đồng bộ chạy 1 phút/lần để đảm bảo thu tiền nhanh nhất." },
            { q: "Trạng thái IS_SYNC = 7 trong bảng CDR_SUCCESS_TOLL_COLLECTION có ý nghĩa gì?", options: ["Giao dịch bị từ chối do thẻ hết hạn", "Giao dịch đã được quét và đẩy sang bảng quản lý nợ DEBT_TRANSACTION thành công", "Đã thanh toán thành công", "Giao dịch đang được chờ duyệt điều chỉnh"], a: 1, exp: "IS_SYNC = 7 là cờ báo hiệu bản ghi CDR đã được đẩy vào luồng thu nợ." },
            { q: "Trong bảng SETTLEMENT.DEBT_TRANSACTION (ETC), mã RECOVERY_STATUS = 10 biểu thị điều gì?", options: ["Giao dịch nợ tạo mới (chờ xử lý)", "Lỗi kết nối API", "Thanh toán/Truy thu thành công", "Lỗi PTTT"], a: 0, exp: "RECOVERY_STATUS = 10 là trạng thái khởi tạo ban đầu khi giao dịch vừa được đẩy vào bảng." },
            { q: "Trong bảng SETTLEMENT.DEBT_TRANSACTION (ETC), mã RECOVERY_STATUS = 11 biểu thị điều gì?", options: ["Giao dịch nợ mới tạo", "Lỗi kết nối API chưa xác định", "Thanh toán/Truy thu thành công", "Đang chờ đối soát thủ công"], a: 2, exp: "RECOVERY_STATUS = 11 là trạng thái thành công sau khi gọi Payment." },
            { q: "Đối với dịch vụ Bãi đỗ (PARK), nếu HĐ liên kết nguồn tiền FW là nguồn chính, TKGT không đủ tiền nhưng FW phản hồi thanh toán thất bại, hệ thống sẽ xử lý thế nào?", options: ["Ghi nợ Blacklist và khoá HĐ ngay lập tức", "Khoá barie không cho xe ra khỏi bãi", "Chuyển hướng sang luồng thanh toán qua QR Code hoặc Tiền mặt", "Đẩy giao dịch vào luồng Job quét lại sau 1 phút"], a: 2, exp: "Bãi đỗ yêu cầu thu tiền tại chỗ, nếu FW lỗi sẽ linh hoạt chuyển sang phương thức dự phòng (QR/Tiền mặt) để giải phóng xe." },
            { q: "Trong bảng DEBT_TRANSACTION, SOURCE_TRANS = 5 đại diện cho loại giao dịch nào?", options: ["Thanh toán trả sau cho OTC/ETC", "Thanh toán trả sau cho nghiệp vụ điều chỉnh tăng", "Giao dịch nạp tiền qua Bank", "Giao dịch trừ cước bãi đỗ"], a: 1, exp: "SOURCE_TRANS = 5 dành cho giao dịch điều chỉnh tăng (Adjusted Toll)." },
            { q: "Trong bảng DEBT_TRANSACTION, SOURCE_TRANS = 4 đại diện cho loại giao dịch nào?", options: ["Thanh toán trả sau cho nghiệp vụ điều chỉnh tăng", "Thanh toán phí SMS", "Thanh toán trả sau cho OTC/ETC", "Thanh toán nợ qua luồng IPN"], a: 2, exp: "SOURCE_TRANS = 4 dùng để phân loại giao dịch gốc ETC." },

            // 3. BLACKLIST & INACTIVE HĐ
            { q: "Fintwin thực hiện gọi lệnh thanh toán sang Ngân hàng của khách (Batch job) vào các khung giờ nào hàng ngày?", options: ["0h00 và 12h00", "8h00 sáng (cho GD 15h-23h59 hôm trước) và 15h00 chiều (cho GD 0h-14h59 cùng ngày)", "10h00 và 16h00", "Cứ 3 tiếng chạy batch 1 lần"], a: 1, exp: "FW gom GD chạy batch 2 lần cố định: 8h sáng và 15h." },
            { q: "Khi nhận dữ liệu Blacklist từ FW, hệ thống CRM kiểm tra tồn tại bản ghi trong CRM.CONTRACT_PAYMENT với điều kiện nào?", options: ["FUND_ID = 7 và STATUS = 2", "FUND_ID = 7 và STATUS IN (1, 3)", "FUND_ID = 6060 và STATUS = 1", "Chỉ cần tồn tại CONTRACT_ID"], a: 1, exp: "Hệ thống kiểm tra ID 7 đang là nguồn chính (1) hoặc nguồn phụ (3) để xử lý khoá." },
            { q: "Khi nhận Blacklist dịch vụ DANTHE, CRM yêu cầu giao dịch trong bảng SALE_TRANS.SALE_TRANS_CODE phải có STATUS bằng mấy?", options: ["STATUS = 1", "STATUS = 2 (đã gửi lệnh thanh toán thành công)", "STATUS = 3", "STATUS = 4 (Đã huỷ)"], a: 1, exp: "STATUS = 2 nghĩa là lệnh thanh toán đã gửi đi, nay nhận lại lỗi từ Bank nên bị Blacklist." },
            { q: "Trong luồng nhận Blacklist DANTHE, nếu PROCESSING_STATUS hiện tại của orderId là 1, hệ thống sẽ trả lỗi gì cho đối tác?", options: ["GD đã được xử lý", "Trạng thái GD không hợp lệ", "Lỗi dữ liệu đầu vào", "Không tìm thấy giao dịch"], a: 0, exp: "PS = 1 nghĩa là GD này ĐÃ NẰM trong danh sách Blacklist rồi, trả lỗi 'GD đã được xử lý' để tránh ghi nợ đúp." },
            { q: "Trong luồng nhận Blacklist DANTHE, nếu PROCESSING_STATUS hiện tại của orderId là 2, hệ thống sẽ trả lỗi gì cho đối tác?", options: ["GD đã được xử lý", "Trạng thái GD không hợp lệ", "Chưa hỗ trợ phương thức này", "Tài khoản không đủ số dư"], a: 1, exp: "PS = 2 nghĩa là GD đã được thanh toán (clear khỏi Blacklist). Trả lỗi 'Trạng thái GD không hợp lệ' vì không thể Blacklist lại một GD đã thanh toán." },
            { q: "Hành động mang tính 'chặn rủi ro' quan trọng nhất mà hệ thống CRM/OCS thực hiện ngay khi ghi nhận giao dịch vào Blacklist là gì?", options: ["Gửi cảnh báo sang luồng giám sát thủ công", "In-active trạng thái liên kết của HĐ (charge_method = 61 -> 60)", "Xoá thông tin thẻ/tài khoản ngân hàng của KH", "Từ chối mọi yêu cầu nạp tiền"], a: 1, exp: "Khoá charge_method về 60 là chốt chặn quan trọng nhất để KH không thể đi qua trạm tiếp." },
            { q: "Blacklist dịch vụ Bãi đỗ (PARK) cập nhật PROCESSING_STATUS về giá trị nào trong bảng SETTLEMENT.PARKING_DEBT_TRANSACTIONS?", options: ["1 (Đang chờ xử lý)", "2 (Giao dịch nợ cần hỗ trợ truy thu)", "3 (Đã gạch nợ)", "21 (Lỗi hệ thống)"], a: 1, exp: "PROCESSING_STATUS = 2 trong luồng Parking định danh cho nợ xấu cần truy thu." },
            { q: "Đối với dịch vụ ETC / ADJUST, luồng ghi nhận Blacklist yêu cầu orderId phải tồn tại trong bảng DEBT_TRANSACTION với RECOVERY_STATUS bằng bao nhiêu?", options: ["10", "11", "12", "14"], a: 1, exp: "Phải là GD đã từng gọi thanh toán thành công (11), sau đó Bank trả lỗi (hậu kiểm) thì mới đưa vào Blacklist." },
            { q: "Khi đưa giao dịch ETC vào Blacklist, hệ thống cập nhật PROCESSING_STATUS bằng bao nhiêu trong bảng DEBT_TRANSACTION?", options: ["1", "2", "21", "22"], a: 2, exp: "Với ETC, PROCESSING_STATUS được đặt là 21 để đánh dấu Blacklist." },
            { q: "Tình huống nghiệp vụ: Tồn tại giao dịch Blacklist, nếu phía ePass lỗi bất đồng bộ không inactive trạng thái liên kết mà vẫn gửi yêu cầu thanh toán mới sang FW. Kết quả sẽ ra sao?", options: ["FW vẫn trừ tiền bình thường", "Giao dịch được đưa vào hàng đợi", "FW sẽ trả lỗi từ chối thanh toán cho tới khi không tồn tại bất cứ giao dịch Blacklist nào", "FW tự động huỷ liên kết của khách"], a: 2, exp: "FW có cơ chế phòng vệ (Cross-check): Từ chối request mới nếu user đang nợ xấu." },

            // 4. LUỒNG IPN (GẠCH NỢ) & RE-ACTIVE
            { q: "Có những phương thức IPN (ipnType) chính nào dùng để gạch nợ (xoá giao dịch khỏi Blacklist) trên FW?", options: ["Chỉ BANK_TRANSFER", "SMS_PAYMENT và WEB_PAYMENT", "BLACKLIST_PAYMENT_SUCCESS và QR_PAYMENT", "AUTO_RETRY và MANUAL_CLEAR"], a: 2, exp: "1. FW chủ động thu được từ Bank (BLACKLIST_PAYMENT_SUCCESS). 2. KH tự trả qua QR (QR_PAYMENT)." },
            { q: "Khi nhận IPN DANTHE với ipnType = 'QR_PAYMENT', hệ thống cập nhật PAYMENT_METHOD_ID trong bảng SALE_TRANS là bao nhiêu?", options: ["1", "2", "3", "Không cập nhật"], a: 2, exp: "PAYMENT_METHOD_ID = 3 quy định cho thanh toán QR." },
            { q: "Khi nhận IPN DANTHE với ipnType = 'BLACKLIST_PAYMENT_SUCCESS', hệ thống cập nhật PAYMENT_METHOD_ID trong bảng SALE_TRANS như thế nào?", options: ["Cập nhật = 1", "Cập nhật = 2", "Không cập nhật", "Cập nhật = 4"], a: 2, exp: "Theo nghiệp vụ DANTHE, IPN từ Batchjob (BLACKLIST_PAYMENT_SUCCESS) thì không cập nhật trường này." },
            { q: "Trong luồng IPN dịch vụ Bãi đỗ (PARK), nếu đối tác truy thu thành công qua luồng batchjob (BLACKLIST_PAYMENT_SUCCESS), PAYMENT_METHOD_ID được cập nhật thành?", options: ["1", "2", "3", "4"], a: 0, exp: "Batchjob Parking -> ID 1." },
            { q: "Trong luồng IPN dịch vụ Bãi đỗ (PARK), nếu ipnType là 'FULL_REFUND' (clear giao dịch nợ gốc), PAYMENT_METHOD_ID được cập nhật thành?", options: ["1", "2", "3", "0"], a: 2, exp: "FULL_REFUND Parking -> ID 3." },
            { q: "Sau khi cập nhật trạng thái gạch nợ thành công cho 1 dịch vụ (VD: DANTHE), hệ thống kiểm tra thông tin liên kết hiện tại của HĐ trên bảng nào để chuẩn bị Re-active?", options: ["SALE_TRANS", "SETTLEMENT.DEBT_TRANSACTION", "CRM.CONTRACT_PAYMENT (STATUS = 1/3, fund_id = 7)", "OCS_PROFILE"], a: 2, exp: "Phải đảm bảo HĐ vẫn đang liên kết FW trước khi xét duyệt Re-active." },
            { q: "Luồng quét nợ chéo (Cross-debt check) để Re-active HĐ kiểm tra dữ liệu ở những bảng nào?", options: ["Chỉ kiểm tra DEBIT_TRANSACTION", "Kiểm tra DEBIT_TRANSACTION, DEBT_TRANSACTION, và PARKING_DEBT_TRANSACTIONS", "Chỉ kiểm tra bảng của dịch vụ vừa thanh toán", "Kiểm tra dư nợ trong tài khoản giao thông"], a: 1, exp: "Phải kiểm tra sạch nợ ở cả 3 mảng: Danthe, ETC, Bãi đỗ." },
            { q: "Trong quá trình quét nợ chéo, điều kiện để xác định HĐ còn nợ dịch vụ DANTHE là gì?", options: ["DEBIT_TRANSACTION.PROCESSING_STATUS = 1", "DEBIT_TRANSACTION.PROCESSING_STATUS = 2", "SALE_TRANS.STATUS = 1", "SALE_TRANS.METHOD_RECHARGE_ID = 60"], a: 0, exp: "PS = 1 trong DEBIT_TRANSACTION là dấu hiệu còn nợ dán thẻ." },

                                    <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm font-bold mb-6 border border-red-100 flex items-center justify-center gap-2">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                        Ghi nhận {cheatCount} lần thoát khỏi trang!
                                    </div>
                                )}

                                <button onClick={() => setScreen('review')} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-4 rounded-xl transition active:scale-95 shadow-lg uppercase tracking-wide">
                                    Xem chi tiết đáp án
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (screen === 'review') return (
                <div className="min-h-screen bg-slate-100 flex flex-col">
                    <header className="bg-white p-6 shadow-sm flex justify-between items-center sticky top-0 z-20 border-b border-slate-200">
                        <h1 className="text-xl md:text-2xl font-black text-slate-800 uppercase tracking-tight">Chi tiết bài làm</h1>
                        <button onClick={() => setScreen('result')} className="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold shadow-md">Đóng</button>
                    </header>
                    <main className="max-w-4xl mx-auto w-full p-4 md:p-6 space-y-6">
                        {questions.map((q, idx) => {
                            const isCorrect = userAnswers[idx] === q.a;
                            return (
                                <div key={idx} className={`bg-white rounded-[2rem] p-6 md:p-8 shadow-sm border-l-[12px] ${isCorrect ? 'border-emerald-500' : 'border-red-500'}`}>
                                    <div className="flex justify-between items-start mb-6">
                                        <p className="font-bold text-lg text-slate-800 leading-snug">Câu {idx + 1}: {q.q}</p>
                                    </div>
                                    <div className="space-y-3 mb-6">
                                        {q.options.map((opt, i) => {
                                            const isSelected = userAnswers[idx] === i;
                                            const isTrueAns = q.a === i;
                                            let style = 'bg-slate-50 border-slate-100 text-slate-500';
                                            if (isTrueAns) style = 'bg-emerald-50 border-emerald-200 text-emerald-700 ring-1 ring-emerald-500 font-bold';
                                            else if (isSelected) style = 'bg-red-50 border-red-200 text-red-700 font-bold';

                                            return (
                                                <div key={i} className={`p-4 rounded-xl text-sm border-2 flex items-start gap-3 ${style}`}>
                                                    <span className="shrink-0 mt-0.5 font-black">{String.fromCharCode(65 + i)}.</span>
                                                    <span>{opt}</span>
                                                    {isTrueAns && <svg className="w-5 h-5 ml-auto text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}
                                                    {isSelected && !isTrueAns && <svg className="w-5 h-5 ml-auto text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M6 18L18 6M6 6l12 12"></path></svg>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div className="bg-amber-50 p-5 rounded-2xl border border-amber-100 text-sm text-amber-900 leading-relaxed">
                                        <strong className="block uppercase text-[10px] tracking-widest mb-1 text-amber-600 font-black">Giải thích nghiệp vụ</strong> 
                                        {q.exp}
                                    </div>
                                </div>
                            );
                        })}
                    </main>
                </div>
            );

            // --- QUẢN TRỊ VIÊN ---
            if (screen === 'admin-login') return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-4">
                    <div className="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-xs text-center">
                        <div className="w-16 h-16 bg-slate-100 text-slate-800 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <h2 className="font-black mb-6 uppercase tracking-widest text-slate-800">Cổng Quản Trị</h2>
                        <input type="password" value={adminPassInput} onChange={e => setAdminPassInput(e.target.value)} className="w-full border-2 border-slate-200 focus:border-slate-800 p-4 rounded-xl mb-4 text-center font-bold outline-none" placeholder="Mật mã..." />
                        <button onClick={() => adminPassInput === ADMIN_PASS ? loadAdminData() : alert("Sai mật mã!")} className="w-full bg-slate-800 text-white py-4 rounded-xl font-black shadow-lg hover:bg-slate-900 transition">XÁC NHẬN</button>
                        <button onClick={() => setScreen('intro')} className="mt-6 text-slate-400 text-xs font-bold uppercase tracking-widest hover:text-slate-600 transition">Trở về trang chủ</button>
                    </div>
                </div>
            );

            if (screen === 'admin') return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                            <h1 className="text-2xl font-black text-slate-800 uppercase tracking-tight">Thống kê kết quả thi ({adminData.length})</h1>
                            
                            <div className="flex items-center gap-4 w-full md:w-auto">
                                <select 
                                    value={sortFilter} 
                                    onChange={(e) => setSortFilter(e.target.value)}
                                    className="p-3 rounded-xl border border-slate-200 font-bold text-sm outline-none bg-white shadow-sm flex-1 md:w-48"
                                >
                                    <option value="date_desc">Mới nhất trước</option>
                                    <option value="score_desc">Điểm cao nhất</option>
                                    <option value="time_asc">Nộp sớm nhất</option>
                                </select>
                                <button onClick={() => setScreen('intro')} className="bg-white px-6 py-3 rounded-xl font-bold shadow-sm border border-slate-200 text-red-600 hover:bg-red-50 transition">ĐĂNG XUẤT</button>
                            </div>
                        </div>

                        <div className="bg-white rounded-[2rem] shadow-sm overflow-hidden border border-slate-200">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left whitespace-nowrap">
                                    <thead className="bg-slate-100 text-slate-500 text-xs font-black uppercase tracking-widest">
                                        <tr>
                                            <th className="p-5">Thí sinh</th>
                                            <th className="p-5">Điểm (Hệ 10)</th>
                                            <th className="p-5">Tỷ lệ</th>
                                            <th className="p-5">Thời gian làm</th>
                                            <th className="p-5">Vi phạm (Thoát tab)</th>
                                            <th className="p-5">Ngày nộp</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {sortedAdminData.map((d, i) => {
                                            const point10 = ((d.score / d.total) * 10).toFixed(1);
                                            const percent = Math.round((d.score / d.total) * 100);
                                            const dDate = new Date(d.timestamp);
                                            return (
                                                <tr key={i} className="hover:bg-slate-50 transition">
                                                    <td className="p-5 font-black text-slate-800">{d.name}</td>
                                                    <td className="p-5 font-black text-blue-600 text-lg">{point10}</td>
                                                    <td className="p-5">
                                                        <span className={`px-3 py-1 rounded-lg text-xs font-black ${percent >= 80 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
                                                            {d.score}/{d.total} ({percent}%)
                                                        </span>
                                                    </td>
                                                    <td className="p-5 font-bold text-slate-600">{formatTime(d.timeSpent)}</td>
                                                    <td className="p-5">
                                                        {d.cheatCount > 0 
                                                            ? <span className="bg-red-100 text-red-700 px-3 py-1 rounded-lg text-xs font-black flex items-center w-max gap-1"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> {d.cheatCount} lần</span>
                                                            : <span className="text-emerald-500 font-bold text-xs">0 (An toàn)</span>}
                                                    </td>
                                                    <td className="p-5 text-slate-400 text-xs font-semibold">{dDate.toLocaleDateString('vi-VN')} {dDate.toLocaleTimeString('vi-VN')}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                            {adminData.length === 0 && <div className="p-12 text-center text-slate-400 font-bold">Chưa có dữ liệu bài thi.</div>}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
